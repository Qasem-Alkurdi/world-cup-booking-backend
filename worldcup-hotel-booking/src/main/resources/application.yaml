spring:
  application:
    name: worldcup-hotel-booking
  profiles:
    active: local,seed
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
    open-in-view: false
  flyway:
    baseline-on-migrate: true
  # ✅ OAuth2 client configuration must be under spring.security.oauth2.client
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile, email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          google:
            issuer-uri: https://accounts.google.com

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /api-docs

logging:
  level:
    org.springdoc: DEBUG

# Top-level app configuration
app:
  storage:
    upload-dir: uploads
    public-base-url: /uploads
    max-file-size-bytes: 5242880
  frontend-url: http://localhost:3000

security:
  jwt:
    secret: ${JWT_SECRET:defaultSecretKeyWithAtLeast32CharactersBase64Encoded}
    issuer: worldcup-hotel-booking
    access-token-minutes: 60
    refresh-token-days: 7