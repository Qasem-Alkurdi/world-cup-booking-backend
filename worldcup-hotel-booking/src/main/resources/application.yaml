spring:
  application:
    name: worldcup-hotel-booking

  profiles:
    active: local

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
    open-in-view: false

  flyway:
    baseline-on-migrate: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /api-docs

logging:
  level:
    org.springdoc: DEBUG

app:
  storage:
    upload-dir: uploads
    public-base-url: /uploads
    max-file-size-bytes: 5242880
